<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics - Nexora</title>
<style>
:root {
  --bg: #0c0805;
  --surface: #161008;
  --gold: #c9a84c;
  --text: #f5ead8;
  --muted: #907860;
  --gn: #4ade80;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  font-family: 'Segoe UI', Arial, sans-serif;
  color: var(--text);
  min-height: 100vh;
  padding: 2rem;
}

.header {
  font-size: 2.5rem;
  font-weight: 800;
  margin-bottom: 2rem;
  background: linear-gradient(135deg, #f5ead8 30%, #c9a84c 70%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav {
  display: flex;
  gap: 1rem;
  margin-bottom: 2rem;
}

.nav a {
  background: var(--surface);
  border: 1px solid rgba(201,168,76,0.2);
  color: var(--muted);
  padding: 0.5rem 1rem;
  border-radius: 8px;
  text-decoration: none;
  font-size: 0.9rem;
  transition: all 0.2s;
}

.nav a:hover, .nav a.act {
  color: var(--gold);
  border-color: var(--gold);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.card {
  background: var(--surface);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 16px;
  padding: 1.5rem;
  transition: all 0.2s;
}

.card:hover {
  border-color: var(--gold);
  box-shadow: 0 8px 24px rgba(201,168,76,0.1);
}

.card-title {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.card-value {
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--gold);
  margin-bottom: 0.5rem;
}

.card-sub {
  font-size: 0.85rem;
  color: var(--muted);
}

.chart-container {
  background: var(--surface);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}

.chart-title {
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 1rem;
}

.chart-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
}

.bar-label {
  width: 100px;
  font-size: 0.9rem;
  color: var(--text);
}

.bar-container {
  flex: 1;
  background: rgba(201,168,76,0.1);
  border-radius: 4px;
  height: 30px;
  position: relative;
  overflow: hidden;
}

.bar-fill {
  background: linear-gradient(90deg, #c9a84c, #e8c76a);
  height: 100%;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
  color: white;
  font-weight: 700;
  font-size: 0.8rem;
}

.stats-table {
  background: var(--surface);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 16px;
  overflow: hidden;
}

.table-header {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  background: rgba(201,168,76,0.1);
  padding: 1rem 1.5rem;
  font-weight: 800;
  font-size: 0.85rem;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.table-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  padding: 1rem 1.5rem;
  border-top: 1px solid rgba(201,168,76,0.1);
  align-items: center;
}

.table-row:hover {
  background: rgba(201,168,76,0.05);
}

.skill-name {
  font-weight: 700;
  color: var(--text);
}

.hours {
  color: var(--gn);
  font-weight: 700;
}

.progress {
  background: rgba(201,168,76,0.1);
  border-radius: 4px;
  height: 6px;
  overflow: hidden;
}

.progress-bar {
  background: var(--gn);
  height: 100%;
  border-radius: 4px;
}

@media (max-width: 768px) {
  .grid { grid-template-columns: 1fr; }
  .table-header, .table-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">📊 Analytics</div>

<div class="nav">
  <a href="book-session.html">Book</a>
  <a href="my-sessions.html">Sessions</a>
  <a href="analytics.html" class="act">Analytics</a>
</div>

<div class="grid">
  <div class="card">
    <div class="card-title">Total Hours</div>
    <div class="card-value" id="totalHours">0</div>
    <div class="card-sub">Learning time</div>
  </div>

  <div class="card">
    <div class="card-title">Sessions Completed</div>
    <div class="card-value" id="sessionsCompleted">0</div>
    <div class="card-sub">Finished sessions</div>
  </div>

  <div class="card">
    <div class="card-title">Total Credits Used</div>
    <div class="card-value" id="creditsUsed">0</div>
    <div class="card-sub">Credits spent</div>
  </div>

  <div class="card">
    <div class="card-title">Favorite Skill</div>
    <div class="card-value" id="favSkill">—</div>
    <div class="card-sub" id="favSkillCount">0 sessions</div>
  </div>
</div>

<div class="chart-container">
  <div class="chart-title">📈 Hours by Skill</div>
  <div id="skillChart"></div>
</div>

<div class="chart-container">
  <div class="chart-title">🎯 Your Learning Path</div>
  <div class="stats-table">
    <div class="table-header">
      <div>Skill</div>
      <div>Hours</div>
      <div>Sessions</div>
      <div>Progress</div>
    </div>
    <div id="skillStats"></div>
  </div>
</div>

<script>
  function loadAnalytics() {
    const sessions = JSON.parse(localStorage.getItem('Nexora_sessions') || '[]');
    
    let totalHours = 0;
    let completedCount = 0;
    let totalCredits = 0;
    let skillMap = {};

    sessions.forEach(s => {
      const hours = parseInt(s.duration) || 1;
      const skill = s.skill || 'Unknown';
      
      totalHours += hours;
      totalCredits += parseInt(s.credits) || 0;
      
      if (s.status === 'completed') {
        completedCount++;
      }

      if (!skillMap[skill]) {
        skillMap[skill] = { hours: 0, sessions: 0 };
      }
      skillMap[skill].hours += hours;
      skillMap[skill].sessions += 1;
    });

    // Find favorite skill
    let favSkill = '—';
    let maxHours = 0;
    for (let skill in skillMap) {
      if (skillMap[skill].hours > maxHours) {
        maxHours = skillMap[skill].hours;
        favSkill = skill;
      }
    }

    // Update cards
    document.getElementById('totalHours').textContent = totalHours;
    document.getElementById('sessionsCompleted').textContent = completedCount;
    document.getElementById('creditsUsed').textContent = totalCredits;
    document.getElementById('favSkill').textContent = favSkill;
    document.getElementById('favSkillCount').textContent = `${skillMap[favSkill]?.sessions || 0} sessions`;

    // Skill chart
    const maxSkillHours = Math.max(...Object.values(skillMap).map(s => s.hours), 1);
    let chartHTML = '';
    for (let skill in skillMap) {
      const percent = (skillMap[skill].hours / maxSkillHours) * 100;
      chartHTML += `
        <div class="chart-bar">
          <div class="bar-label">${skill}</div>
          <div class="bar-container">
            <div class="bar-fill" style="width: ${percent}%">${skillMap[skill].hours}h</div>
          </div>
        </div>
      `;
    }
    document.getElementById('skillChart').innerHTML = chartHTML || '<p style="color: var(--muted);">No data yet</p>';

    // Skill stats table
    let statsHTML = '';
    for (let skill in skillMap) {
      const data = skillMap[skill];
      const percent = (data.hours / 100) * 100; // Assume 100 hours max goal
      statsHTML += `
        <div class="table-row">
          <div class="skill-name">${skill}</div>
          <div class="hours">${data.hours}h</div>
          <div>${data.sessions}</div>
          <div>
            <div class="progress">
              <div class="progress-bar" style="width: ${Math.min(percent, 100)}%"></div>
            </div>
          </div>
        </div>
      `;
    }
    document.getElementById('skillStats').innerHTML = statsHTML || '<div style="padding: 2rem; text-align: center; color: var(--muted);">Book sessions to see progress</div>';
  }

  loadAnalytics();
</script>
</body>
</html>
