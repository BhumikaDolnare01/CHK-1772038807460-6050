<!DOCTYPE html>
<html>
<head>
<title>Login / Signup</title>

<style>

body{
font-family: Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
color:white;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#38bdf8;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.switch{
margin-top:15px;
cursor:pointer;
color:#38bdf8;
}

</style>
</head>

<body>

<div class="container">

<h2 id="formTitle">Login</h2>

<form id="loginForm">

<input type="email" id="loginEmail" placeholder="Email" required>
<input type="password" id="loginPassword" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<form id="signupForm" style="display:none;">

<input type="text" id="signupUsername" placeholder="Username" required>
<input type="email" id="signupEmail" placeholder="Email" required>
<input type="password" id="signupPassword" placeholder="Password" required>

<button type="submit">Sign Up</button>

</form>

<p class="switch" onclick="toggleForms()">Don't have an account? Sign Up</p>

</div>


<script>

let isLogin=true;

function toggleForms(){

isLogin=!isLogin;

document.getElementById("loginForm").style.display = isLogin ? "block":"none";
document.getElementById("signupForm").style.display = isLogin ? "none":"block";

document.getElementById("formTitle").innerText = isLogin ? "Login":"Sign Up";

document.querySelector(".switch").innerText =
isLogin ? "Don't have an account? Sign Up":"Already have an account? Login";

}


document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault();

let username=document.getElementById("signupUsername").value;
let email=document.getElementById("signupEmail").value;
let password=document.getElementById("signupPassword").value;

let user={
username:username,
email:email,
password:password
};

localStorage.setItem("user",JSON.stringify(user));

alert("Signup successful! You can now login.");

toggleForms();

});


document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let email=document.getElementById("loginEmail").value;
let password=document.getElementById("loginPassword").value;

let savedUser=JSON.parse(localStorage.getItem("user"));

if(savedUser && email===savedUser.email && password===savedUser.password){

alert("Login successful! Welcome "+savedUser.username);

}else{

alert("Invalid email or password");

}

});

</script>

</body>
</html>
