<!DOCTYPE html>
<html lang="en">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillX Rewards</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--bg:#EAEFEF;
--card:#BFC9D1;
--text:#25343F;
--accent:#FF9B51;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:var(--bg);
color:var(--text);
}

/* header */

header{
text-align:center;
padding:50px 20px;
}

header h1{
font-size:2.7rem;
}

header span{
color:var(--accent);
}

/* credit box */

.wallet{
width:300px;
margin:30px auto;
background:white;
padding:25px;
border-radius:14px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.wallet h2{
font-size:2rem;
color:var(--accent);
}

/* progress */

.progress-container{
width:60%;
margin:40px auto;
}

.progress-bar{
height:12px;
background:#dfe5e8;
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
background:var(--accent);
width:0%;
transition:1s;
}

/* stages */

.ladder{
max-width:900px;
margin:50px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

.stage{
background:white;
padding:30px;
border-radius:16px;
text-align:center;
transition:0.3s;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.stage:hover{
transform:translateY(-8px);
}

.stage.locked{
opacity:.4;
}

.stage h3{
margin-bottom:10px;
}

.reward{
font-size:1.5rem;
color:var(--accent);
font-weight:800;
margin:10px 0;
}

button{
background:var(--accent);
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:600;
}

button:disabled{
background:#aaa;
cursor:not-allowed;
}

/* responsive */

@media(max-width:800px){

.ladder{
grid-template-columns:1fr 1fr;
}

}

</style>
</head>

<body>

<header>

<h1>Nexora <span>Reward Ladder</span></h1>
<p>Earn credits and unlock real rewards</p>

</header>

<div class="wallet">

<h2 id="creditValue">0</h2>
<p>Your Credits</p>

</div>

<div class="progress-container">

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

</div>

<div class="ladder">

<div class="stage" data-credit="25">

<h3>Stage 1</h3>
<p>25 Credits</p>
<div class="reward">₹10</div>

<button onclick="claim(1)">Claim</button>

</div>

<div class="stage" data-credit="50">

<h3>Stage 2</h3>
<p>50 Credits</p>
<div class="reward">₹30</div>

<button onclick="claim(2)">Claim</button>

</div>

<div class="stage" data-credit="75">

<h3>Stage 3</h3>
<p>75 Credits</p>
<div class="reward">₹55</div>

<button onclick="claim(3)">Claim</button>

</div>

<div class="stage" data-credit="100">

<h3>Stage 4</h3>
<p>100 Credits</p>
<div class="reward">₹90</div>

<button onclick="claim(4)">Claim</button>

</div>

</div>

<script>
    (function(){
emailjs.init("TaFj87_dKIqChyJdJ");
})();

let userCredits = 42

document.getElementById("creditValue").innerText=userCredits

let progress=(userCredits/100)*100
document.getElementById("progress").style.width=progress+"%"

document.querySelectorAll(".stage").forEach(stage=>{

let req=stage.dataset.credit

if(userCredits<req){

stage.classList.add("locked")
stage.querySelector("button").disabled=true

}

})

function claim(stage){

let rewards = {
1: {credits:25, amount:10},
2: {credits:50, amount:30},
3: {credits:75, amount:55},
4: {credits:100, amount:90}
}

let reward = rewards[stage]

emailjs.send(
"service_onlm9bm",
"template_47y512g",
{
user_name: "SkillX User",
user_email: "user@email.com",
amount: reward.amount,
credits: reward.credits
}
)

.then(function(){

alert("₹"+reward.amount+" claimed! Email sent successfully.")

})

.catch(function(error){

alert("Reward claimed but email failed.")

})

}
</script>

</body>
</html>
